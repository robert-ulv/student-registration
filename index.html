<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .logo { display: block; margin: 0 auto 20px; max-width: 150px; height: auto; }

        label {
            font-weight: bold;
            border: 2px solid #222; 
            padding: 6px 10px;
            display: inline-block;
            margin-bottom: 8px;
            border-radius: 5px;
            background-color: #fafafa;
        }

        .option-label { border: none; padding: 0; font-weight: normal; background: none; margin-bottom: 0; }

        .input-group { margin-bottom: 18px; }
        input[type="text"], input[type="email"], input[type="date"], select {
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }
        
        .btn-container { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .submit-btn { background-color: #007bff; color: white; }
        .submit-btn:hover { background-color: #0056b3; }
        .reset-btn { background-color: #6c757d; color: white; }
        .reset-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="form-container">
    <img src="logo.png" alt="School Logo" class="logo">
    
    <h2>Student Registration Form</h2>

    <form action="#">
        <div class="input-group">
            <label for="full-name">Name:</label>
            <input type="text" id="full-name" name="full-name" required>
        </div>

        <div class="input-group">
            <label for="user-email">Email Address:</label>
            <input type="email" id="user-email" name="user-email" required>
        </div>

        <div class="input-group">
            <label for="birth-date">Date of Birth:</label>
            <input type="date" id="birth-date" name="birth-date">
        </div>

        <div class="input-group">
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male" class="option-label">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female" class="option-label">Female</label>
        </div>

        <div class="input-group">
            <label>Hobbies:</label><br>
            <input type="checkbox" id="read" name="hobbies">
            <label for="read" class="option-label">Reading</label>
            <input type="checkbox" id="sport" name="hobbies">
            <label for="sport" class="option-label">Sports</label>
            <input type="checkbox" id="music" name="hobbies">
            <label for="music" class="option-label">Music</label>
        </div>

        <div class="input-group">
            <label for="course">Main Course/Subject:</label>
            <select id="course" name="course">
                <option value="it">Information Technology</option>
                <option value="cs">Computer Science</option>
                <option value="bit">Business IT</option>
            </select>
        </div>

        <div class="btn-container">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
